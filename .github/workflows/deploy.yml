name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Use public npm registry in CI
        # The committed bunfig.toml + bun.lock point at the corporate Artifactory
        # mirror, which is unreachable from GitHub runners. Rewrite the registry
        # URL in-place so `--frozen-lockfile` still verifies the same versions
        # and integrity hashes (the tarball bytes are identical on either mirror).
        run: |
          cat > bunfig.toml <<'EOF'
          [install]
          registry = "https://registry.npmjs.org/"
          EOF
          sed -i 's|https://repo\.inform-software\.com/artifactory/api/npm/npmjs-remote|https://registry.npmjs.org|g' bun.lock
      - name: Install
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test src/lib
      - name: Build
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: bun run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes \
            -p semantic-release@24 \
            -p @semantic-release/changelog@6 \
            -p @semantic-release/git@10 \
            semantic-release
