name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Use public npm registry in CI
        # The committed bunfig.toml + bun.lock point at the corporate Artifactory
        # mirror, which is unreachable from GitHub runners. Rewrite the registry
        # URL in-place so `--frozen-lockfile` still verifies the same versions
        # and integrity hashes (the tarball bytes are identical on either mirror).
        run: |
          cat > bunfig.toml <<'EOF'
          [install]
          registry = "https://registry.npmjs.org/"
          EOF
          sed -i 's|https://repo\.inform-software\.com/artifactory/api/npm/npmjs-remote|https://registry.npmjs.org|g' bun.lock
      - name: Install
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test src/lib
      - name: Build (validate only — discarded)
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: bun run build

  release:
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    # Build + deploy only when semantic-release just cut a new version.
    # Checks out `main` AFTER the release commit so the bundle embeds the
    # bumped package.json version.
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
      - name: Use public npm registry in CI
        run: |
          cat > bunfig.toml <<'EOF'
          [install]
          registry = "https://registry.npmjs.org/"
          EOF
          sed -i 's|https://repo\.inform-software\.com/artifactory/api/npm/npmjs-remote|https://registry.npmjs.org|g' bun.lock
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: bun run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
