<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0090a7" />
    <title>Ping — Table Tennis Tournaments</title>
    <script>
      // Apply theme before paint to avoid a flash. Default is dark.
      (function () {
        var saved = null
        try { saved = localStorage.getItem('ping.theme') } catch (e) {}
        if (saved !== 'light') document.documentElement.classList.add('app-theme-dark')
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
